name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova CLI Globally
      run: npm install -g cordova

    - name: Create Android Platform Framework
      run: cordova platform add android@12.0.0 --save

    - name: Force Append Hardware Plugins
      run: |
        cordova plugin add cordova-plugin-camera --save
        cordova plugin add cordova-plugin-network-information --save
        cordova plugin add cordova-plugin-background-mode --save
        cordova plugin add cordova-plugin-appminimize --save

    - name: Compile Unsigned Release APK
      run: cordova build android --release --no-telemetry

    - name: Upload Finished App Installer Bundle
      uses: actions/upload-artifact@v4
      with:
        name: StockEntry-App
        path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
