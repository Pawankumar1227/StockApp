name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova CLI
      run: npm install -g cordova

    - name: Build Android App via Native Runners
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk
      run: |
        cordova platform add android --save
        cordova plugin add cordova-plugin-camera --save
        cordova plugin add cordova-plugin-network-information --save
        cordova plugin add cordova-plugin-background-mode --save
        cordova plugin add cordova-plugin-appminimize --save
        cordova build android --release --no-telemetry

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: StockEntry-App
        path: platforms/android/app/build/outputs/apk/release/*.apk
