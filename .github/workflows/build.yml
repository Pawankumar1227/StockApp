name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Cordova CLI Globally
      run: npm install -g cordova@12.0.0

    - name: Prepare Clean Environment
      run: |
        rm -rf platforms/
        rm -rf plugins/

    - name: Build Android App
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        cordova platform add android@12.0.0 --save
        cordova plugin add cordova-plugin-camera --save
        cordova plugin add cordova-plugin-network-information --save
        cordova plugin add cordova-plugin-background-mode --save
        cordova plugin add cordova-plugin-appminimize --save
        cordova build android --release --no-telemetry

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: StockEntry-App
        path: platforms/android/app/build/outputs/apk/release/*.apk
