name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Install Android SDK
      uses: malmstein/android-sdk-cli-action@v1

    - name: Add Android Platform
      run: cordova platform add android --save

    - name: Force Install Hardware Plugins
      run: |
        cordova plugin add cordova-plugin-camera --save
        cordova plugin add cordova-plugin-network-information --save
        cordova plugin add cordova-plugin-background-mode --save
        cordova plugin add cordova-plugin-appminimize --save

    - name: Build APK
      run: cordova build android --release

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: StockEntry-App
        path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
