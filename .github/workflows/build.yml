name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up Node.js Environment
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Cordova CLI Globally
      run: npm install -g cordova

    - name: Set up Java Development Kit (JDK 11)
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Set up Android SDK Tools
      uses: android-actions/setup-android@v3

    - name: Create Cordova Project Platform
      run: cordova platform add android --save

    - name: FORCE INSTALL CRITICAL HARDWARE PLUGINS
      run: |
        cordova plugin add cordova-plugin-camera --save
        cordova plugin add cordova-plugin-network-information --save
        cordova plugin add cordova-plugin-background-mode --save
        cordova plugin add cordova-plugin-appminimize --save

    - name: Build Android Release Package (APK)
      run: cordova build android --release

    - name: Upload Finished App Installer Bundle
      uses: actions/upload-artifact@v3
      with:
        name: StockEntry-App
        path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
